<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOJUCHATS - Consultor Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        :root {
            --primary: #004d99;
            --primary-light: #0073e6;
            --accent: #00c2ff;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Start from top */
            overflow-y: auto; /* Page scrollbar */
            padding: 40px 0;
        }

        #app-container {
            width: 95%;
            max-width: 1200px;
            height: auto; /* Growth with content */
            min-height: 95vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            margin-bottom: 20px;
        }

        /* Header */
        header {
            padding: 18px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(0, 194, 255, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            background: var(--glass);
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            overflow: visible; /* No internal scrollbar */
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #chat-window::-webkit-scrollbar {
            width: 6px;
        }

        #chat-window::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 20px 24px;
            border-radius: 24px;
            line-height: 1.7;
            font-size: 1.05rem;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--text-main);
            margin-bottom: 24px;
            scroll-margin-top: 100px; /* Suficiente espacio para que no quede debajo del header sticky */
            overflow: visible !important;
            height: auto !important;
        }

        .message.bot {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 6px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            margin-bottom: 8px;
            box-shadow: 0 0 15px var(--accent);
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-right-radius: 6px;
            box-shadow: 0 15px 35px -5px rgba(0, 77, 153, 0.4);
        }

        .source-tag {
            display: inline-block;
            font-size: 0.75rem;
            margin-top: 8px;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            background: rgba(0, 194, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0, 194, 255, 0.2);
            transition: all 0.2s;
        }

        .source-tag:hover {
            background: rgba(0, 194, 255, 0.25);
            transform: translateY(-1px);
        }

        /* Input Area */
        footer {
            padding: 18px 32px;
            border-top: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.9); /* More opaque for readability when scrolling */
            backdrop-filter: blur(10px);
            display: flex;
            gap: 16px;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 100;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 115, 230, 0.2);
        }

        button#send-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button#send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 115, 230, 0.4);
        }

        button#send-btn:active {
            transform: translateY(0);
        }

        /* Hero Banner Styles */
        #hero-banner {
            width: 100%;
            height: 380px; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            background: linear-gradient(180deg, rgba(0, 77, 153, 0.2), transparent);
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
            padding: 100px 40px 60px 40px; /* Mas espacio abajo (60px) para que el subtitulo no sea tapado por el header sticky */
            transition: all 0.5s ease;
            position: relative;
            overflow: visible; 
            margin-bottom: 20px; /* Separación extra para que el header empiece más abajo */
        }

        #hero-banner img {
            max-height: 220px; /* 'Middle ground' size as requested */
            width: auto;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            animation: float 6s ease-in-out infinite;
            margin-bottom: 0px;
            z-index: 10;
        }

        .hero-title-large {
            font-size: 4rem; /* Smaller title to fit all */
            font-weight: 900;
            margin-top: 5px;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff, var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        /* Dynamic states for "At a glance" visibility */
        .chat-active #hero-banner {
            height: 160px;
            padding: 20px;
        }
        .chat-active #hero-banner img {
            max-height: 80px;
        }
        .chat-active .hero-title-large {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .chat-active #hero-banner p {
            display: none;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* Settings Button */
        .settings-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Formatting & Loader */
        .message strong { color: var(--accent); }
        .message ul { margin-left: 20px; }

        .typing {
            display: flex;
            gap: 4px;
            padding: 4px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        h1, .hero-title-large {
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* Hide banner when chat starts */
        .chat-active #hero-banner {
            height: 0;
            padding: 0;
            opacity: 0;
            border: none;
            overflow: hidden;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { 
                align-items: flex-start; 
                padding: 0;
            }
            #app-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
            header {
                padding: 16px;
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            .hero-title-large {
                font-size: 3rem;
            }
            #hero-banner {
                height: 350px;
            }
            #hero-banner img {
                max-height: 180px;
            }
            .message {
                max-width: 95%;
                padding: 16px;
                font-size: 0.95rem;
            }
            footer {
                padding: 16px;
            }
            input#api-key {
                top: auto;
                bottom: 80px;
                right: 20px;
            }
            .status {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Banner at the top for maximum visibility -->
        <div id="hero-banner">
            <img src="banner.png" alt="Carga banner.png en la carpeta" id="mascot-img-display" onerror="this.src='https://via.placeholder.com/400x300?text=Guarda+la+foto+como+banner.png'">
            <h1 class="hero-title-large">TOJUCHATS</h1>
            <p style="color: var(--text-dim); margin-top: 5px; margin-bottom: 30px; font-weight: 500;">Tu consultor de confianza de Adeslas</p>
        </div>

        <header>
            <div class="logo-container">
                <div class="logo-icon">T</div>
                <div>
                    <h1>TOJUCHATS</h1>
                    <p style="font-size: 0.75rem; color: var(--text-dim);">Asistente de Documentación Corporativa</p>
                </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="status">
                    <div class="status-dot"></div>
                    <span id="status-text">Base de datos cargada: <span id="doc-count">0</span> documentos</span>
                </div>
                <a href="faq.html" class="settings-btn" title="Guía de Consultas" style="text-decoration: none; font-size: 1.2rem;">
                    📖
                </a>
                <div class="settings-btn" onclick="toggleSettings()" title="Configuración de API">
                    ⚙️
                </div>
                <input type="password" id="api-key" placeholder="Pega tu Google API Key aquí..." 
                       style="position: absolute; right: 80px; top: 24px; width: 0; padding: 0; border: none; overflow: hidden; transition: 0.3s; background: #000;">
            </div>
        </header>

        <main id="chat-window">
        </main>

        <footer>
            <input type="text" id="user-input" placeholder="Pregunta sobre coberturas, copagos, provincias..." autofocus>
            <button id="send-btn">
                <span>Enviar</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const docCountEl = document.getElementById('doc-count');
        const apiKeyInput = document.getElementById('api-key');

        // Final Cleanup: We use the listener at the end of the script for initialization
        function toggleSettings() {
            if (apiKeyInput.style.width === '300px') {
                apiKeyInput.style.width = '0';
                apiKeyInput.style.padding = '0';
                localStorage.setItem('google_api_key', apiKeyInput.value);
            } else {
                apiKeyInput.style.width = '300px';
                apiKeyInput.style.padding = '14px 20px';
                apiKeyInput.style.border = '1px solid var(--glass-border)';
            }
        }

        function addMessage(text, side, source = null, sourcePath = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${side}`;
            
            if (side === 'bot') {
                const avatar = document.createElement('div');
                avatar.className = 'bot-avatar';
                avatar.innerText = 'T';
                msgDiv.appendChild(avatar);
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';

            // Premium Formatting (Enhanced)
            let formattedText = text
                .replace(/\* \*\*(.*?)\*\*/g, '<li><strong>$1</strong>') // Style bullet points
                .replace(/\*\*(.*?)\*\*/g, '<strong style="color: var(--accent); font-weight: 700; border-bottom: 1px solid rgba(0, 194, 255, 0.2);">$1</strong>') // Bold with underline accent
                .replace(/^[*•] (.*)/gm, '<div style="background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 12px; margin: 10px 0; border-left: 3px solid var(--accent);">$1</div>') // Card-style list
                .replace(/(\d{3} \d{3} \d{3})/g, '<span style="color: var(--accent); font-weight: 600; text-decoration: underline;">$1</span>') // Style phone numbers
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');
            
            contentDiv.innerHTML = formattedText;
            msgDiv.appendChild(contentDiv);
            
            if (source && sourcePath) {
                const srcLink = document.createElement('a');
                srcLink.className = 'source-tag';
                srcLink.href = sourcePath;
                srcLink.target = '_blank';
                srcLink.style.marginTop = '15px';
                srcLink.innerText = `📄 Fuente Oficial: ${source}`;
                msgDiv.appendChild(srcLink);
            }
            
            chatWindow.appendChild(msgDiv);
            
            // Scroll logic: User wants to see the START of the message if bot, or regular scroll if user
            if (side === 'bot' || side === 'ai') {
                setTimeout(() => {
                    // Scroll de la página completa hasta el inicio del nuevo mensaje
                    msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            } else {
                // Para el usuario, scroll hasta el final para ver lo que acaba de escribir
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }

            return msgDiv;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot typing-bubble';
            div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chatWindow.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'start' });
            return div;
        }

        // Logic to search documents
        function searchDocs(query, forcedDocTitle = null) {
            const queryLower = query.toLowerCase();
            const terms = queryLower.split(/\s+/).filter(t => t.length > 2);
            if (terms.length === 0) return null;

            // Intent identification: Is it about costs?
            const isCostQuery = terms.some(t => ['cuánto', 'cuanto', 'cuesta', 'precio', 'pago', 'copago', 'coste', 'import', 'valoro', 'tarifa', 'casa', 'domicilio', 'abonar'].some(k => t.includes(k)));
            
            // Priority for forced document from FAQ
            if (forcedDocTitle) {
                const exactMatch = PDF_DATA.find(d => d.title.toLowerCase() === forcedDocTitle.toLowerCase());
                if (exactMatch) {
                    let bestSnippet = "";
                    let maxWinScore = 0;
                    const windowSize = 4000;
                    
                    for (let i = 0; i < exactMatch.content.length - windowSize; i += 400) {
                        const win = exactMatch.content.substring(i, i + windowSize).toLowerCase();
                        let score = 0;
                        terms.forEach(t => { if(win.includes(t)) score++; });
                        
                        // Si es query de costes, dar peso extra si la ventana tiene € o terminos de precio
                        if (isCostQuery && (win.includes('€') || win.includes('copago') || win.includes('precio'))) {
                            score += 5;
                        }

                        if (score > maxWinScore) {
                            maxWinScore = score;
                            bestSnippet = exactMatch.content.substring(i, i + windowSize);
                        }
                    }

                    // FALLBACK: If the forced document doesn't seem to have the answer (low score)
                    // and it's a cost query, try global search to find the REAL answer
                    if (isCostQuery && maxWinScore < 3) {
                         const globalBest = searchDocs(query, null);
                         if (globalBest && globalBest.score > 20) return globalBest;
                    }

                    if (!bestSnippet) bestSnippet = exactMatch.content.substring(0, 4000);
                    return { ...exactMatch, snippet: bestSnippet, score: maxWinScore };
                }
            }

            // Intent recognition
            const isLocationQuery = terms.some(t => ['donde', 'dónde', 'provincia', 'ciudad', 'oficina', 'cuadro', 'médico'].some(k => t.includes(k)));

            let bestMatch = null;
            let maxScore = 0;
            let bestSnippet = "";

            PDF_DATA.forEach(doc => {
                let score = 0;
                const contentLower = doc.content.toLowerCase();
                const titleLower = doc.title.toLowerCase();

                // 1. High Score for Title Matches (Fuzzy)
                let titleMatches = 0;
                terms.forEach(term => {
                    if (titleLower.includes(term)) {
                        score += 100; 
                        titleMatches++;
                    } else {
                        // Partial title match (coincidencias)
                        if (term.length > 4 && titleLower.includes(term.substring(0, 4))) {
                            score += 30;
                        }
                    }
                });
                
                if (titleMatches > 1) score += 200;

                // 2. Score for Content Matches
                terms.forEach(term => {
                    const regex = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                    const matches = contentLower.match(regex);
                    if (matches) score += matches.length;
                });

                // 3. INTENT BOOSTS
                if (isCostQuery) {
                    const costBoosters = ['copago', 'tarifa', 'precio', 'importe', 'cuánto', 'cuesta'];
                    if (costBoosters.some(b => titleLower.includes(b))) {
                        score += 3000; // Boost masivo para docs de precios
                    }
                    if (titleLower.includes('cuadro médico') || titleLower.includes('cuadro de servicios')) {
                        score -= 5000; // Penalización masiva: los cuadros médicos casi nunca tienen precios
                    }
                    // Bonus si el contenido tiene el símbolo €
                    if (contentLower.includes('€')) score += 500;
                }

                if (isLocationQuery) {
                    if (titleLower.includes('cuadro médico') || titleLower.includes('provincia') || titleLower.includes('guía')) {
                        score += 2000;
                    }
                }

                if (score > maxScore) {
                    maxScore = score;
                    bestMatch = doc;
                    
                    // 4. Fragmento Contextual
                    let snippet = doc.content.substring(0, 4000);
                    let bestWinScore = 0;
                    const windowSize = 4000;
                    
                    for (let i = 0; i < doc.content.length - windowSize; i += 500) {
                        const win = doc.content.substring(i, i + windowSize).toLowerCase();
                        let winScore = 0;
                        terms.forEach(t => { if(win.includes(t)) winScore++; });
                        
                        if (winScore > bestWinScore) {
                            bestWinScore = winScore;
                            snippet = doc.content.substring(i, i + windowSize);
                        }
                    }
                    bestSnippet = snippet;
                }
            });

            if (bestMatch) {
                return { ...bestMatch, snippet: bestSnippet, score: maxScore };
            }
            return null;
        }

        async function chatWithGemini(query, context) {
            const key = apiKeyInput.value || localStorage.getItem('google_api_key');
            if (!key) return null;

            const prompt = `
                Eres TOJUCHATIS, el asistente experto en seguros de Adeslas. 
                Eres conocido por tu precisión extrema y tu capacidad para encontrar detalles escondidos en los documentos.
                
                Instrucciones Críticas:
                1. Responde ÚNICAMENTE basándote en el CONTEXTO proporcionado abajo.
                2. Si el contexto menciona importes, límites, porcentajes de copago o tarifas, DEBES incluirlos. No digas que no tienes la información si aparece en el texto. Se exhaustivo.
                3. Si el contexto es ambiguo, explica lo que sí has encontrado con claridad.
                4. Usa un tono cercano, profesional y tranquilizador.
                5. Destaca datos clave (precios, centros, coberturas) en **negrita**.
                6. Cita siempre el nombre del documento al final de tu respuesta.

                DATO DEL DOCUMENTO: ${context.title}
                FRAGMENTO RELEVANTE PARA ESTUDIAR:
                """
                ${context.snippet || context.content.substring(0, 4000)}
                """
                
                PREGUNTA DEL USUARIO: ${query}
            `;

            const models = [
                'gemini-3-flash-preview',
                'gemini-2.0-flash-latest',
                'gemini-1.5-flash-latest', 
                'gemini-1.5-pro-latest'
            ];
            let firstErrorMsg = "";

            for (let i = 0; i < models.length; i++) {
                const model = models[i];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: {
                                temperature: 0,
                                topP: 0.1,
                                topK: 1
                            }
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        const msg = data.error?.message || `Error con ${model}`;
                        if (i === 0) firstErrorMsg = msg;
                        console.warn(`Falló ${model}:`, msg);
                    }
                } catch (e) {
                    if (i === 0) firstErrorMsg = e.message;
                    console.error(`Error de red con ${model}:`, e);
                }
            }

            return `**Error de IA:** ${firstErrorMsg}. \n\n**Tip:** En tu cuenta he visto que tienes habilitado **Gemini 3 Flash Preview**. He añadido soporte para él. Prueba ahora.`;
        }

        async function handleSend(forcedDoc = null) {
            const queryRaw = userInput.value.trim();
            if (!queryRaw) return;
            const query = queryRaw.toLowerCase();

            // Trigger banner collapse on first message to focus on chat
            document.getElementById('app-container').classList.add('chat-active');
            
            addMessage(queryRaw, 'user');
            userInput.value = '';

            const typing = showTyping();

            // 0. Handle greetings
            const greetings = ['hola', 'buenos dias', 'buenas tardes', 'buenas noces', 'quien eres', 'ayuda'];
            if (greetings.some(g => query.includes(g)) && !forcedDoc) {
                typing.remove();
                addMessage("¡Hola! Soy **TOJUCHATIS**, tu asistente virtual para documentos de Adeslas. \n\nPuedes preguntarme por:\n- **Copagos**: ¿Cuánto cuesta una consulta?\n- **Cuadros Médicos**: ¿Hay dentista en Madrid?\n- **Coberturas**: ¿Qué incluye el seguro GO?\n\n¡Dime qué necesitas!", 'bot');
                return;
            }

            // 1. Search relevant doc
            const match = searchDocs(query, forcedDoc);
            
            if (!match) {
                typing.remove();
                addMessage("Lo siento, no he encontrado información específica sobre eso. Intenta preguntar con palabras clave como 'Copagos', 'Dental', o el nombre de una provincia.", 'bot');
                return;
            }

            // Quick handling for allergy vaccines specifically (common question)
            if (query.includes('vacuna') && query.includes('alergia')) {
                typing.remove();
                addMessage("En Adeslas Pymes y Plena, los **tests de alergia están cubiertos**, pero las **vacunas de la alergia** suelen estar excluidas de la cobertura directa del seguro (se pagan aparte en farmacia), aunque su **administración** en el centro médico sí está incluida. \n\nHe encontrado el documento **" + match.title + "** que te puede dar más detalle.", 'bot', match.title, match.path);
                return;
            }

            // 2. Try Gemini if Key exists, else return raw extract
            const key = apiKeyInput.value || localStorage.getItem('google_api_key');
            if (key) {
                const aiResponse = await chatWithGemini(query, match);
                typing.remove();
                if (aiResponse) {
                    addMessage(aiResponse, 'bot', match.title, match.path);
                } else {
                    addMessage("No he podido procesar la respuesta con IA, pero he encontrado algo relevante en el documento **" + match.title + "**: \n\n**Extracto:**\n" + match.snippet + "...", 'bot', match.title, match.path);
                }
            } else {
                typing.remove();
                addMessage("He encontrado información en el documento **" + match.title + "**. \n\nPara obtener una respuesta inteligente, por favor configura tu API Key en el icono de engranaje superior. \n\n**Información encontrada:**\n" + match.snippet + "...", 'bot', match.title, match.path);
            }
        }

        // Auto-handle parameters from FAQ and perform One-time Init
        window.addEventListener('load', () => {
            // Document count
            if (typeof PDF_DATA !== 'undefined' && docCountEl) {
                docCountEl.innerText = PDF_DATA.length;
            }
            
            // API Key
            const savedKey = localStorage.getItem('google_api_key');
            if (savedKey && apiKeyInput) apiKeyInput.value = savedKey;

            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            const doc = params.get('doc');
            
            if (q) {
                userInput.value = q;
                handleSend(doc); // Pasamos el documento forzado
            } else {
                // Solo si no venimos del FAQ mostramos el saludo inicial
                addMessage("¡Hola! Soy **TOJUCHATIS**. Puedo ayudarte con dudas sobre copagos, cuadros médicos o coberturas de Adeslas. \n\n¿Qué deseas consultar hoy?", 'bot');
            }
        });

        sendBtn.addEventListener('click', () => handleSend());
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
