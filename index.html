<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOJUCHATS - Consultor Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <style>
        :root {
            --primary: #004d99;
            --primary-light: #0073e6;
            --accent: #00c2ff;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 40px 0;
        }

        #app-container {
            width: 95%;
            max-width: 1200px;
            height: auto;
            min-height: 95vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            margin-bottom: 20px;
        }

        /* Header */
        header {
            padding: 18px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(0, 194, 255, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            background: var(--glass);
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            overflow: visible;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #chat-window::-webkit-scrollbar {
            width: 6px;
        }

        #chat-window::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 20px 24px;
            border-radius: 24px;
            line-height: 1.7;
            font-size: 1.05rem;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--text-main);
            margin-bottom: 24px;
            scroll-margin-top: 100px;
            overflow: visible !important;
            height: auto !important;
        }

        .message.bot {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 6px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            margin-bottom: 8px;
            box-shadow: 0 0 15px var(--accent);
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-right-radius: 6px;
            box-shadow: 0 15px 35px -5px rgba(0, 77, 153, 0.4);
        }

        .source-tag {
            display: inline-block;
            font-size: 0.75rem;
            margin-top: 8px;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            background: rgba(0, 194, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0, 194, 255, 0.2);
            transition: all 0.2s;
        }

        .source-tag:hover {
            background: rgba(0, 194, 255, 0.25);
            transform: translateY(-1px);
        }

        /* Input Area */
        footer {
            padding: 18px 32px;
            border-top: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 16px;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 100;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 115, 230, 0.2);
        }

        button#send-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button#send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 115, 230, 0.4);
        }

        button#send-btn:active {
            transform: translateY(0);
        }

        /* Hero Banner Styles */
        #hero-banner {
            width: 100%;
            height: 380px; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            background: linear-gradient(180deg, rgba(0, 77, 153, 0.2), transparent);
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
            padding: 100px 40px 60px 40px;
            transition: all 0.5s ease;
            position: relative;
            overflow: visible; 
            margin-bottom: 20px;
        }

        #hero-banner img {
            max-height: 220px;
            width: auto;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            animation: float 6s ease-in-out infinite;
            margin-bottom: 0px;
            z-index: 10;
        }

        .hero-title-large {
            font-size: 4rem;
            font-weight: 900;
            margin-top: 5px;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff, var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        /* Dynamic states for "At a glance" visibility */
        .chat-active #hero-banner {
            height: 160px;
            padding: 20px;
        }
        .chat-active #hero-banner img {
            max-height: 80px;
        }
        .chat-active .hero-title-large {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .chat-active #hero-banner p {
            display: none;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* Settings Button */
        .settings-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Formatting & Loader */
        .message strong { color: var(--accent); }
        .message ul { margin-left: 20px; }

        .typing {
            display: flex;
            gap: 4px;
            padding: 4px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        h1, .hero-title-large {
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* Hide banner when chat starts */
        .chat-active #hero-banner {
            height: 0;
            padding: 0;
            opacity: 0;
            border: none;
            overflow: hidden;
        }

        /* ============ SUGGESTION CHIPS ============ */
        #suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 32px 20px 32px;
            justify-content: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .chat-active #suggestion-chips {
            display: none;
        }
        .chip {
            background: rgba(0, 194, 255, 0.08);
            border: 1px solid rgba(0, 194, 255, 0.25);
            color: var(--accent);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }
        .chip:hover {
            background: rgba(0, 194, 255, 0.2);
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 20px -6px rgba(0, 194, 255, 0.3);
        }
        .chip:active {
            transform: scale(0.97);
        }

        /* ============ TABLE RENDERING ============ */
        .msg-content table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 16px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            font-size: 0.92rem;
        }
        .msg-content table thead th {
            background: rgba(0, 194, 255, 0.12);
            color: var(--accent);
            padding: 12px 16px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid rgba(0, 194, 255, 0.2);
            white-space: nowrap;
        }
        .msg-content table tbody td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-main);
        }
        .msg-content table tbody tr:last-child td {
            border-bottom: none;
        }
        .msg-content table tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        /* ============ SOURCE PREVIEW POPUP ============ */
        .source-preview-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 5000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .source-preview-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .source-preview-card::-webkit-scrollbar { width: 6px; }
        .source-preview-card::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        .source-preview-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }
        .source-preview-close:hover { background: rgba(255,70,70,0.3); }
        .source-preview-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 20px;
            padding-right: 50px;
        }
        .source-preview-content {
            font-size: 0.92rem;
            line-height: 1.8;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ============ MEMORY BADGE ============ */
        .memory-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: rgba(16, 185, 129, 0.8);
            background: rgba(16, 185, 129, 0.08);
            padding: 3px 10px;
            border-radius: 100px;
            border: 1px solid rgba(16, 185, 129, 0.15);
            margin-left: 12px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { 
                align-items: flex-start; 
                padding: 0;
            }
            #app-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
            header {
                padding: 16px;
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            .hero-title-large {
                font-size: 3rem;
            }
            #hero-banner {
                height: 350px;
            }
            #hero-banner img {
                max-height: 180px;
            }
            .message {
                max-width: 95%;
                padding: 16px;
                font-size: 0.95rem;
            }
            footer {
                padding: 16px;
            }
            input#api-key {
                top: auto;
                bottom: 80px;
                right: 20px;
            }
            .status {
                font-size: 0.75rem;
            }
            #suggestion-chips {
                padding: 0 16px 16px;
            }
            .chip {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
            .source-preview-card {
                width: 95%;
                padding: 20px;
                border-radius: 16px;
            }
        }

        /* Gatekeeper CSS */
        #gatekeeper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            transition: opacity 0.5s ease;
        }
        .gate-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }
        .gate-input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
            outline: none;
        }
        .gate-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .gate-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body style="overflow: hidden;"> <!-- Lock scroll until authed -->

    <!-- Security Gate -->
    <div id="gatekeeper">
        <div class="gate-card">
            <div class="logo-icon" style="margin: 0 auto 20px auto; width: 60px; height: 60px;">T</div>
            <h2 style="margin-bottom: 10px;">ACCESO PRIVADO</h2>
            <p style="color: var(--text-dim);">Introduce el código de seguridad para utilizar TOJUCHATIS</p>
            <input type="password" id="gate-pass" class="gate-input" placeholder="••••••••••••••">
            <button onclick="checkAccess()" class="gate-btn">ENTRAR AL SISTEMA</button>
            <p id="gate-error" style="color: #ff4d4d; margin-top: 15px; font-size: 0.85rem; display: none;">Código incorrecto. Acceso denegado.</p>
        </div>
    </div>

    <div id="app-container">
        <!-- Banner at the top for maximum visibility -->
        <div id="hero-banner">
            <img src="banner.png" alt="Carga banner.png en la carpeta" id="mascot-img-display" onerror="this.src='https://via.placeholder.com/400x300?text=Guarda+la+foto+como+banner.png'">
            <h1 class="hero-title-large">TOJUCHATS</h1>
            <p style="color: var(--text-dim); margin-top: 5px; margin-bottom: 30px; font-weight: 500;">Tu consultor de confianza de Adeslas</p>
        </div>

        <header>
            <div class="logo-container">
                <div class="logo-icon">T</div>
                <div>
                    <h1>TOJUCHATS</h1>
                    <p style="font-size: 0.75rem; color: var(--text-dim);">Asistente de Documentación Corporativa</p>
                </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="status">
                    <div class="status-dot"></div>
                    <span id="status-text">Base de datos cargada: <span id="doc-count">0</span> documentos</span>
                    <span class="memory-badge" id="memory-badge" style="display:none;">🧠 <span id="memory-count">0</span> msgs</span>
                </div>
                <a href="feedback.html" class="settings-btn" title="Feedback Plataforma" style="text-decoration: none; font-size: 1.2rem; width: auto; padding: 0 15px; display: flex; align-items: center; gap: 8px;">
                    💬 <span style="font-size: 0.85rem; font-weight: 600;">Feedback Plataforma</span>
                </a>
                <a href="faq.html" class="settings-btn" title="Guía de Consultas" style="text-decoration: none; font-size: 1.2rem;">
                    📖
                </a>
                <div class="settings-btn" onclick="toggleSettings()" title="Configuración de API">
                    ⚙️
                </div>
                <input type="password" id="api-key" placeholder="Pega tu Google API Key aquí..." 
                       oninput="localStorage.setItem('google_api_key', this.value)"
                       style="position: absolute; right: 80px; top: 24px; width: 0; padding: 0; border: none; overflow: hidden; transition: 0.3s; background: #000;">
            </div>
        </header>

        <!-- Dynamic FAQ Suggestion Chips -->
        <div id="suggestion-chips"></div>

        <main id="chat-window">
        </main>

        <footer>
            <input type="text" id="user-input" placeholder="Pregunta sobre coberturas, copagos, provincias..." autofocus>
            <button id="send-btn">
                <span>Enviar</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const docCountEl = document.getElementById('doc-count');
        const apiKeyInput = document.getElementById('api-key');

        // ====================================================================
        // FEATURE 1: CONVERSATION MEMORY (Short-Term History)
        // ====================================================================
        const conversationHistory = []; // Stores {role: 'user'|'model', text: '...'}
        const MAX_HISTORY = 10; // Keep last 10 exchanges (5 user + 5 bot)

        function addToHistory(role, text) {
            conversationHistory.push({ role, text });
            // Trim to keep only the last MAX_HISTORY messages
            while (conversationHistory.length > MAX_HISTORY) {
                conversationHistory.shift();
            }
            // Update memory badge
            const badge = document.getElementById('memory-badge');
            const countEl = document.getElementById('memory-count');
            if (conversationHistory.length > 0) {
                badge.style.display = 'inline-flex';
                countEl.innerText = conversationHistory.length;
            }
        }

        function getHistoryContext() {
            if (conversationHistory.length === 0) return '';
            let ctx = '\n\nHISTORIAL DE CONVERSACIÓN RECIENTE (usa esto para entender preguntas de seguimiento):\n';
            conversationHistory.forEach(msg => {
                const label = msg.role === 'user' ? 'USUARIO' : 'ASISTENTE';
                // Limit each message to 500 chars in history to save tokens
                const trimmed = msg.text.length > 500 ? msg.text.substring(0, 500) + '...' : msg.text;
                ctx += `${label}: ${trimmed}\n`;
            });
            return ctx;
        }

        // ====================================================================
        // FEATURE 2: ENHANCED SEMANTIC SEARCH with synonym expansion
        // ====================================================================
        const SYNONYM_MAP = {
            'precio': ['coste', 'importe', 'tarifa', 'cuanto', 'cuánto', 'cuesta', 'vale', 'pagar', 'pago', 'euros', 'copago'],
            'copago': ['precio', 'coste', 'importe', 'pago', 'abonar'],
            'medico': ['médico', 'doctor', 'facultativo', 'especialista', 'profesional'],
            'hospital': ['hospitalización', 'ingreso', 'clínica', 'centro'],
            'urgencia': ['urgencias', 'emergencia', 'emergencias', 'urgente'],
            'embarazo': ['parto', 'maternidad', 'obstetricia', 'gestación', 'embarazada'],

            'niño': ['niños', 'infantil', 'pediátrico', 'pediatría', 'menor', 'menores', 'hijo', 'hijos'],
            'operacion': ['operación', 'cirugía', 'cirugía', 'quirúrgico', 'intervención'],
            'psicologia': ['psicología', 'psicólogo', 'psicológico', 'terapia', 'psicoterapia', 'salud mental'],
            'rehabilitacion': ['rehabilitación', 'fisioterapia', 'fisio', 'recuperación'],
            'viaje': ['viajes', 'extranjero', 'internacional', 'desplazamiento', 'repatriación'],
            'cancer': ['cáncer', 'oncología', 'oncológico', 'quimioterapia', 'radioterapia', 'tumor'],
            'cubre': ['cobertura', 'coberturas', 'cubierto', 'incluye', 'incluido', 'asegurado'],
            'carencia': ['carencias', 'espera', 'periodo', 'meses'],
            'empresa': ['empresas', 'pymes', 'autónomo', 'autónomos', 'negocio', 'negocios', 'cif', 'nif'],
            'senior': ['seniors', 'mayor', 'mayores', 'tercera edad', 'jubilado'],
            'reembolso': ['rembolso', 'devolver', 'devolución', 'reintegro'],
            'vacuna': ['vacunas', 'inyectable', 'vacunación', 'preventivo', 'exclusión', 'excluido', 'no cubre', 'por mi cuenta', 'pagar yo', 'ipid'],
        };

        function expandQuery(query) {
            const words = query.toLowerCase().split(' ').filter(t => t.length > 2);
            const expanded = new Set(words);
            words.forEach(word => {
                // Check direct match
                Object.entries(SYNONYM_MAP).forEach(([key, synonyms]) => {
                    if (key === word || synonyms.includes(word)) {
                        expanded.add(key);
                        synonyms.forEach(s => expanded.add(s));
                    }
                });
            });
            return Array.from(expanded);
        }

        function searchDocs(query, forcedDoc = null) {
            if (!query) return null;
            const originalTerms = query.toLowerCase().split(' ').filter(t => t.length > 2);
            const expandedTerms = expandQuery(query);
            const isCostQuery = query.includes('cuanto') || query.includes('cuánto') || query.includes('precio') || query.includes('copago') || query.includes('tarifa') || query.includes('importe') || query.includes('cuesta');
            
            // FEATURE 1 Enhancement: If this looks like a follow-up, extract context from history
            let historyTerms = [];
            if (originalTerms.length <= 3 && conversationHistory.length > 0) {
                // Short questions might be follow-ups, extract key terms from last exchange
                const lastBot = conversationHistory.filter(m => m.role === 'model').slice(-1)[0];
                const lastUser = conversationHistory.filter(m => m.role === 'user').slice(-1)[0];
                if (lastUser) {
                    historyTerms = lastUser.text.toLowerCase().split(' ').filter(t => t.length > 3);
                }
            }
            
            let matches = [];
            
            PDF_DATA.forEach(doc => {
                let score = 0;
                const contentLower = doc.content.toLowerCase();
                const titleLower = doc.title.toLowerCase();

                if (forcedDoc && titleLower.includes(forcedDoc.toLowerCase())) {
                    score += 10000;
                }

                // FEATURE Enhancement: Boost IPID documents for exclusion/critical queries
                const isExclusionQuery = query.toLowerCase().includes('vacun') || query.toLowerCase().includes('no cub') || query.toLowerCase().includes('exclu') || query.toLowerCase().includes('paga');
                if (isExclusionQuery && (titleLower.includes('ipid') || contentLower.includes('documento de información sobre producto'))) {
                    score += 5000;
                }

                // Original terms get HIGHEST weight (exact match)
                originalTerms.forEach(term => {
                    if (titleLower.includes(term)) score += 800; // Boosted title weight
                });

                originalTerms.forEach(term => {
                    if (contentLower.includes(term)) {
                        const count = contentLower.split(term).length - 1;
                        score += count * 8; // Boosted content weight
                    }
                });

                // Expanded synonyms get MEDIUM weight
                expandedTerms.forEach(term => {
                    if (!originalTerms.includes(term)) { // Only new synonyms
                        if (titleLower.includes(term)) score += 200;
                        if (contentLower.includes(term)) {
                            const count = Math.min(contentLower.split(term).length - 1, 10);
                            score += count * 3;
                        }
                    }
                });

                // History terms get LOW weight (for follow-up context)
                historyTerms.forEach(term => {
                    if (titleLower.includes(term)) score += 100;
                    if (contentLower.includes(term)) score += 2;
                });

                if (isCostQuery && (titleLower.includes('copago') || titleLower.includes('tarifa') || titleLower.includes('precio'))) {
                    score += 3000;
                }

                if (score > 20) {
                    const snippet = doc.content.length > 8000 ? doc.content.substring(0, 8000) + "..." : doc.content;
                    matches.push({ ...doc, content: snippet, score });
                }
            });

            matches.sort((a, b) => b.score - a.score);
            return matches.slice(0, 5);
        }

        // ====================================================================

        function showSourcePreview(title, path) {

            const doc = PDF_DATA.find(d => d.title === title);

            const previewContent = doc.content.length > 5000

            overlay.innerHTML = `

                    <div class="source-preview-title">📄 ${title}</div>

                    </div>
                    <div class="source-preview-content">${previewContent.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>

        // ====================================================================
        // FEATURE 5: ENHANCED FORMATTER (Tables, Lists, Cards)
        // ====================================================================
        function formatBotMessage(text) {
            let html = text;

            // STEP 1: Detect and render markdown tables (| col | col |)
            html = html.replace(/((?:^\|.+\|\s*\n?)+)/gm, function(tableBlock) {
                const rows = tableBlock.trim().split('\n').filter(r => r.trim().length > 0);
                if (rows.length < 2) return tableBlock;

                // Check if second row is separator (|---|---|)
                const isSeparator = (row) => /^\|[\s\-:]+\|/.test(row.trim());
                let headerRow = null;
                let dataRows = [];

                if (rows.length >= 2 && isSeparator(rows[1])) {
                    headerRow = rows[0];
                    dataRows = rows.slice(2);
                } else {
                    dataRows = rows;
                }

                const parseCells = (row) => row.split('|').filter((c, i, arr) => i > 0 && i < arr.length - 1).map(c => c.trim());

                let tableHtml = '<table>';
                if (headerRow) {
                    const cells = parseCells(headerRow);
                    tableHtml += '<thead><tr>' + cells.map(c => `<th>${c}</th>`).join('') + '</tr></thead>';
                }
                tableHtml += '<tbody>';
                dataRows.forEach(row => {
                    if (!isSeparator(row)) {
                        const cells = parseCells(row);
                        tableHtml += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
                    }
                });
                tableHtml += '</tbody></table>';
                return tableHtml;
            });

            // STEP 2: Detect colon-separated data like "Concepto: Valor" and make them elegant
            // (Only for lines that look like key:value pairs, minimum 3 consecutive)
            html = html.replace(/((?:^.{3,40}:\s+.+\n?){3,})/gm, function(block) {
                const lines = block.trim().split('\n').filter(l => l.includes(':'));
                if (lines.length < 3) return block;
                let tableHtml = '<table><tbody>';
                lines.forEach(line => {
                    const idx = line.indexOf(':');
                    const key = line.substring(0, idx).trim();
                    const val = line.substring(idx + 1).trim();
                    tableHtml += `<tr><td style="font-weight:600;color:var(--accent);white-space:nowrap;">${key}</td><td>${val}</td></tr>`;
                });
                tableHtml += '</tbody></table>';
                return tableHtml;
            });

            // STEP 3: Bold and accent styling
            html = html
                .replace(/\* \*\*(.*?)\*\*/g, '<li><strong>$1</strong>')
                .replace(/\*\*(.*?)\*\*/g, '<strong style="color: var(--accent); font-weight: 700; border-bottom: 1px solid rgba(0, 194, 255, 0.2);">$1</strong>')
                .replace(/^[*•] (.*)/gm, '<div style="background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 12px; margin: 10px 0; border-left: 3px solid var(--accent);">$1</div>')
                .replace(/(\d{3} \d{3} \d{3})/g, '<span style="color: var(--accent); font-weight: 600; text-decoration: underline;">$1</span>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');

            return html;
        }

        function addMessage(text, side, source = null, sourcePath = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${side}`;
            
            if (side === 'bot') {
                const avatar = document.createElement('div');
                avatar.className = 'bot-avatar';
                avatar.innerText = 'T';
                msgDiv.appendChild(avatar);
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';

            if (side === 'bot') {
                contentDiv.innerHTML = formatBotMessage(text);
            } else {
                contentDiv.innerText = text;
            }
            msgDiv.appendChild(contentDiv);
            
            // FEATURE 6: Source with preview popup
            if (source && sourcePath) {
                const srcLink = document.createElement('a');
                srcLink.className = 'source-tag';
                srcLink.href = '#';
                srcLink.style.marginTop = '15px';
                srcLink.innerText = `📄 Fuente Oficial: ${source}`;
                srcLink.onclick = (e) => {
                    e.preventDefault();
                    showSourcePreview(source, sourcePath);
                };
                msgDiv.appendChild(srcLink);
            }
            
            chatWindow.appendChild(msgDiv);
            
            if (side === 'bot' || side === 'ai') {
                setTimeout(() => {
                    msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            } else {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }

            return msgDiv;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot typing-bubble';
            div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chatWindow.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'start' });
            return div;
        }

        let lastAiError = "";

        // ====================================================================
        // DIRECT AI CALL — gemini-2.5-flash-lite (verified working model)
        // ====================================================================
        async function chatWithGemini(query, matches) {
            const key = apiKeyInput.value.trim() || localStorage.getItem('google_api_key');
            if (!key) return null;
            lastAiError = "";

            let contextStr = matches.map((m, idx) => `
### FUENTE #${idx+1}: ${m.title}
CONTENIDO:
${m.content}
`).join("\n\n");
            const historyCtx = getHistoryContext();
            const prompt = `Eres TOJUCHATS, el asistente EXPERTO de seguros Adeslas.

REGLAS DE RESPUESTA:
1. Responde SOLO a lo que el usuario pregunta. No añadas información que no haya pedido.
2. Analiza con cuidado los documentos "IPID" (Documento de información sobre producto) ya que contienen las REGLAS CRÍTICAS y EXCLUSIONES (ej: vacunas, psicólogos, etc.).
3. Si el documento dice "serán por cuenta del asegurado", deja claro que NO están cubiertos.
4. Estructura la respuesta de forma clara y bonita:
   - Usa **negrita** para datos importantes (precios, nombres de productos, límites).
   - Usa listas con viñetas para enumerar coberturas o características.
   - Usa tablas markdown (| col1 | col2 |) para comparativas de precios o productos.
5. Incluye TODOS los datos relevantes a la pregunta (precios, copagos, límites, carencias) sin omitir ninguno.
6. Cita el nombre del documento fuente al final.
7. Si el usuario hace una pregunta de SEGUIMIENTO, usa el historial para entender el contexto.
8. Responde siempre en ESPAÑOL con un tono profesional y cercano.
9. Si hay varios productos o planes, organízalos visualmente para que se vean claros de un vistazo.
${historyCtx}

DOCUMENTOS:
"""
${contextStr}
"""

PREGUNTA: ${query}`;

            try {
                const resp = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0, maxOutputTokens: 8192 }
                        })
                    }
                );
                const data = await resp.json();
                if (resp.ok && data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                    return data.candidates[0].content.parts[0].text;
                }
                if (data.error) {
                    lastAiError = data.error.message || JSON.stringify(data.error);
                }
            } catch (e) {
                lastAiError = e.message;
            }
            return null;
        }

        // ====================================================================
        // FEATURE 4: DYNAMIC FAQ SUGGESTION CHIPS
        // ====================================================================
        const SUGGESTION_CHIPS = [
            { label: "💰 Copagos Plena", q: "¿Cuáles son los copagos de Adeslas Plena?", doc: "COPAGOS Plena Total Vital.pdf" },
            { label: "🦷 Cobertura Dental", q: "¿Qué cubre el seguro dental de Adeslas?", doc: null },
            { label: "🏥 Cuadro Médico Madrid", q: "¿Cuadro médico de Madrid?", doc: "Cuadro Médico General - MADRID.pdf" },
            { label: "🤰 Embarazo y Parto", q: "¿El parto tiene carencia en Adeslas?", doc: null },
            { label: "🤖 Cirugía Robótica", q: "¿La cirugía robótica está cubierta?", doc: null },
            { label: "✈️ Asistencia en Viaje", q: "¿Qué cubre la asistencia en viaje al extranjero?", doc: null },
            { label: "🧠 Psicología Clínica", q: "¿Cuántas sesiones de psicología cubre Adeslas?", doc: null },

            { label: "🏢 Pymes Total", q: "¿Qué incluye Adeslas Pymes Total?", doc: null },
            { label: "👴 Seniors", q: "¿Qué cubre Adeslas Seniors Total?", doc: null },
        ];

        function renderChips() {
            const container = document.getElementById('suggestion-chips');
            SUGGESTION_CHIPS.forEach(chip => {
                const el = document.createElement('div');
                el.className = 'chip';
                el.innerText = chip.label;

                    userInput.value = chip.q;
                    handleSend(chip.doc);
                };
                container.appendChild(el);
            });
        }

        // ====================================================================
        // MAIN SEND HANDLER (with memory integration)
        // ====================================================================
        async function handleSend(forcedDoc = null) {
            const queryRaw = userInput.value.trim();
            if (!queryRaw) return;
            const query = queryRaw.toLowerCase();
            
            document.getElementById('app-container').classList.add('chat-active');
            addMessage(queryRaw, 'user');
            addToHistory('user', queryRaw); // MEMORY: Store user message
            userInput.value = '';
            const typing = showTyping();

            // 1. Mandatory IA Key check
            const key = apiKeyInput.value || localStorage.getItem('google_api_key');
            if (!key) {
                typing.remove();
                addMessage("🚫 **Sistema en pausa.** Introduce tu API Key en ajustes ⚙️ para usar la inteligencia de Adeslas.", 'bot');
                return;
            }

            // 2. Search matches (Top 5 fragments) - Enhanced Semantic Search
            const matches = searchDocs(query, forcedDoc);
            if (!matches || matches.length === 0) {
                typing.remove();
                addMessage("No he encontrado información específica en los documentos sobre eso. Intenta con palabras clave como 'Copagos', 'Dental' o 'Cuadro Médico'.", 'bot');
                return;
            }

            // 3. AI Response based on Multiple Fragments + Conversation Memory
            const aiResponse = await chatWithGemini(query, matches);
            typing.remove();
            if (aiResponse) {
                addMessage(aiResponse, 'bot', matches[0].title, matches[0].path);
                addToHistory('model', aiResponse); // MEMORY: Store AI response
            } else {
                let errorHelp = lastAiError ? `\n\n**Detalles técnicos:** ${lastAiError}` : "";
                if (lastAiError.includes("API key not valid") || lastAiError.includes("403") || lastAiError.includes("401")) {
                    errorHelp += "\n\n⚠️ **Parece que hay un problema con tu clave.** Verifica que has copiado la clave completa de Google AI Studio y que tienes activado el pago (si usas límites) o que es una clave activa.";
                }
                addMessage("Lo siento, no he podido conectar con la Inteligencia Artificial." + errorHelp, 'bot');
            }
        }

        // ====================================================================
        // INITIALIZATION
        // ====================================================================
        window.addEventListener('load', () => {
            // Document count
            if (typeof PDF_DATA !== 'undefined' && docCountEl) {
                docCountEl.innerText = PDF_DATA.length;
            }
            
            // API Key
            const savedKey = localStorage.getItem('google_api_key');
            if (savedKey && apiKeyInput) apiKeyInput.value = savedKey;

            // Render suggestion chips
            renderChips();

            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            const doc = params.get('doc');
            
            if (q) {
                userInput.value = q;
                handleSend(doc); 
            } else {
                addMessage("¡Hola! Soy **TOJUCHATS**, tu asistente experto de Adeslas. 🧠\n\nPuedo ayudarte con dudas sobre **copagos, cuadros médicos, coberturas y comparativas** de todos los productos Adeslas, usando los documentos oficiales.\n\n💡 **Novedad:** Ahora recuerdo el contexto de nuestra conversación, así que puedes hacer preguntas de seguimiento como *\"¿y en el otro plan?\"*\n\n¿Qué deseas consultar hoy?", 'bot');
            }
        });

        sendBtn.addEventListener('click', () => handleSend());
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
